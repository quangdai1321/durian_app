# File: /etc/nginx/sites-available/durian
# Thay YOUR_DOMAIN.COM bằng domain thật của bạn

server {
    listen 80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # Tự redirect HTTP → HTTPS (certbot tự thêm)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # SSL certificate — certbot tự tạo
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

    # Upload size
    client_max_body_size 15M;

    # API Backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Static files (ảnh upload)
    location /uploads/ {
        alias /home/durian/app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # Docs (Swagger) — ẩn trên production nếu muốn
    location /docs {
        proxy_pass http://127.0.0.1:8000;
    }
}
